<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tauri + SvelteKit + Typescript App</title>
    <style>
      /* Dark Theme CSS Variables */
      :root {
        /* Primary Colors */
        --bg-primary: #1a1a1a;
        --bg-secondary: #2d2d2d;
        --bg-tertiary: #3a3a3a;

        /* Accent Colors (Calming Blue) */
        --accent-primary: #4A90E2;
        --accent-secondary: #5BA3F5;
        --accent-tertiary: #3A7BD5;

        /* Text Colors */
        --text-primary: #ffffff;
        --text-secondary: #b0b0b0;
        --text-muted: #808080;

        /* Status Colors */
        --success: #4CAF50;
        --warning: #FF9800;
        --error: #F44336;
        --info: #2196F3;

        /* Interactive Elements */
        --border-primary: #404040;
        --border-accent: #4A90E2;
        --hover-bg: #404040;

        /* Shadows and Effects */
        --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.3);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 0 2px rgba(74, 144, 226, 0.3);

        /* Animation Durations */
        --duration-fast: 150ms;
        --duration-normal: 300ms;
        --duration-slow: 500ms;

        /* Easing Functions */
        --ease-out: cubic-bezier(0.25, 0.46, 0.45, 0.94);
        --ease-in: cubic-bezier(0.55, 0.055, 0.675, 0.19);
        --ease-in-out: cubic-bezier(0.645, 0.045, 0.355, 1);
      }

      /* Base button styles */
      .btn {
        padding: 8px 16px;
        border: 1px solid var(--border-primary);
        border-radius: 6px;
        background-color: var(--bg-secondary);
        color: var(--text-primary);
        font-size: 0.9rem;
        transition: all var(--duration-fast) var(--ease-out);
        cursor: pointer;
      }

      .btn:hover {
        background-color: var(--hover-bg);
        border-color: var(--border-accent);
      }

      .btn-primary {
        background-color: var(--accent-primary);
        border-color: var(--accent-primary);
        color: white;
      }

      .btn-primary:hover {
        background-color: var(--accent-tertiary);
        border-color: var(--accent-tertiary);
      }

      .btn-secondary {
        background-color: transparent;
        border-color: var(--accent-primary);
        color: var(--accent-primary);
      }

      .btn-secondary:hover {
        background-color: var(--accent-primary);
        color: white;
      }

      /* Card styles */
      .card {
        background-color: var(--bg-secondary);
        border: 1px solid var(--border-primary);
        border-radius: 8px;
        box-shadow: var(--shadow-sm);
      }

      /* Status styles */
      .status-success {
        color: var(--success);
      }

      /* Animations */
      @keyframes slide-in-right {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      @keyframes slide-out-right {
        from {
          transform: translateX(0);
          opacity: 1;
        }
        to {
          transform: translateX(100%);
          opacity: 0;
        }
      }

      @keyframes fade-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes fade-out {
        from {
          opacity: 1;
        }
        to {
          opacity: 0;
        }
      }

      .settings-drawer {
        animation: slide-in-right var(--duration-normal) var(--ease-out);
      }

      .settings-drawer.closing {
        animation: slide-out-right 250ms var(--ease-in);
      }

      .settings-backdrop {
        animation: fade-in 200ms var(--ease-out);
      }

      .settings-backdrop.closing {
        animation: fade-out 200ms var(--ease-in);
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
